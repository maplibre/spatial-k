[tasks.api]
dir = ".."
run = [
  "rm -rf docs/public/api/dokka",
  "./gradlew :dokkaGenerateHtml $SPATIAL_K_GRADLE_ARGS",
]

[tasks.dev]
depends = ["api"]
run = '''
version="${SPATIAL_K_VERSION:-$(cd .. && ./gradlew -q properties $SPATIAL_K_GRADLE_ARGS | sed -n 's/^version: //p' | head -n 1)}"
SPATIAL_K_VERSION="$version" pnpm exec astro dev
'''

[tasks.start]
depends = ["dev"]

[tasks.build]
depends = ["api"]
run = '''
version="${SPATIAL_K_VERSION:-$(cd .. && ./gradlew -q properties $SPATIAL_K_GRADLE_ARGS | sed -n 's/^version: //p' | head -n 1)}"
SPATIAL_K_VERSION="$version" pnpm exec astro build
'''

[tasks.preview]
depends = ["api"]
run = '''
version="${SPATIAL_K_VERSION:-$(cd .. && ./gradlew -q properties $SPATIAL_K_GRADLE_ARGS | sed -n 's/^version: //p' | head -n 1)}"
SPATIAL_K_VERSION="$version" pnpm exec astro preview
'''

[tasks.astro]
run = "pnpm exec astro"

[tasks.clean]
run = "rm -rf .astro dist public/api"
