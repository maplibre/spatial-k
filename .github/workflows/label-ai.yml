name: Label AI-generated PRs

on:
    pull_request_target:
        types: [opened, reopened, synchronize]

permissions:
    contents: read
    pull-requests: write

jobs:
    label:
        runs-on: ubuntu-latest
        steps:
            - uses: sargunv/ai-pr-detector@a04d6c93ea3900a27a8dafa6be725b61d2176fac # main as of 2026-04-24
              with:
                  label: ai-generated
