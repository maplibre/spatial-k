[settings]
experimental = true
pin = true
lockfile = true

[hooks]
postinstall = [
  "hk install --mise",
  "pnpm install --frozen-lockfile --loglevel warn",
  "pnpm --filter docs exec astro sync",
]

[tools]
"core:java" = "temurin-21.0.11+10.0.LTS"
"aqua:dprint/dprint" = "0.54.0"
"aqua:jdx/hk" = "1.46.0"
"aqua:apple/pkl" = "0.31.1"
"aqua:facebook/ktfmt" = "0.63"
"github:google/google-java-format" = "1.35.0"
"core:node" = "24.16.0"
"aqua:pnpm/pnpm" = "10.33.2"

[tasks.build]
description = "Build and check all targets"
run = "./gradlew build"

[tasks."test:jvm"]
description = "Run JVM tests"
run = "./gradlew jvmTest"

[tasks."test:jsnode"]
description = "Run JS Node tests"
run = "./gradlew jsNodeTest"

[tasks."test:wasmjsnode"]
description = "Run WASM JS Node tests"
run = "./gradlew wasmJsNodeTest"

[tasks."test:native"]
description = "Run native tests for the current platform"
run = "./gradlew $( uname | grep -q Darwin && (uname -m | grep -q arm64 && echo macosArm64Test || echo macosX64Test) || echo linuxX64Test )"

[tasks."test:swift"]
description = "Run Swift tests for Kotlin/Native ObjC-exported Apple APIs"
run = '''
if [ "$(uname)" != "Darwin" ]; then
  echo "Skipping Swift tests: Apple Kotlin/Native frameworks require macOS."
  exit 0
fi

./gradlew :pmtiles:assembleSpatialKPmtilesKotlinDebugXCFramework
swift test --package-path pmtiles/src
'''

[tasks.test]
description = "Run all tests"
depends = ["test:jvm", "test:jsnode", "test:wasmjsnode", "test:native", "test:swift"]

[tasks.docs]
description = "Serve documentation locally"
run = "mise run -C docs dev"

[tasks."docs:build"]
description = "Build documentation"
run = "mise run -C docs build"

[tasks."docs:clean"]
description = "Clean documentation outputs"
run = "mise run -C docs clean"

[tasks.check]
description = "Run all linting and formatting checks"
run = "hk check --all"

[tasks.fix]
description = "Auto-fix formatting issues"
run = "hk fix --all"

[tasks._ktfmt]
description = "Called by dprint.json"
hide = true
run = 'java -jar {{ tools["aqua:facebook/ktfmt"].path }}/ktfmt'
